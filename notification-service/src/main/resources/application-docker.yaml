spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/uam_dev
    username: postgres
    password: 123456

  jpa:
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: true
    validate-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp}
    port: ${MAIL_PORT:1025}

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: uam-system

logging:
  level:
    root: INFO
    com.r2s.uam: INFO