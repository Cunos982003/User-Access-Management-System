spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/uam_dev
    username: postgres
    password: 123456

  jpa:
    show-sql: false

  redis:
    host: redis
    port: 6379

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 604800
    issuer: uam-auth-service
  notification-service-url: http://notification-service:8083

audit:
  service:
    url: http://audit-service:8084/api/v1

logging:
  level:
    root: INFO
    com.r2s.uam: INFO