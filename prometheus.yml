global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'uam-cluster'
    replica: '0'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    metrics_path: '/api/v1/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['auth-service:8080']
        labels:
          application: 'auth-service'
          environment: 'docker'

  - job_name: 'spring-actuator'
    metrics_path: '/api/v1/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['auth-service:8080']
        labels:
          application: 'uam'
          service: 'auth'
