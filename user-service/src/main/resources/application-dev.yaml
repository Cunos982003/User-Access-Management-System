spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/uam_dev
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: true
    validate-on-migrate: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=600s

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

app:
  jwt:
    secret: dev-secret-key-change-this-in-production-minimum-256-bits-for-hs256-algorithm
    access-token-expiry: 900
    refresh-token-expiry: 604800
    issuer: uam-system

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

logging:
  level:
    com.r2s.uam.user: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
