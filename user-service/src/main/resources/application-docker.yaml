spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/uam_dev
    username: postgres
    password: 123456

  jpa:
    show-sql: false

  redis:
    host: redis
    port: 6379

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: true
    validate-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: uam-system
  notification:
    service:
      url: http://notification-service:8083

logging:
  level:
    root: INFO
    com.r2s.uam: INFO